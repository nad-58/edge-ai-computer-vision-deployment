name: Python checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run edge inference profile
        run: |
          PYTHONPATH=src python examples/edge_inference_profile.py
      - name: Run model latency report
        run: |
          PYTHONPATH=src python examples/model_latency_report.py
      - name: Run deployment readiness report
        run: |
          PYTHONPATH=src python examples/deployment_readiness_report.py
